spring:
  application:
    name: team3
  datasource:
    url: jdbc:postgresql://pg-43erb5.vpc-pub-cdb-kr.ntruss.com:5432/labdb
    username: labuser
    password: 'lab1234!#'
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
