# 동기 벡터 임베딩 (RAG 전용). base-url 은 아래에 직접 적거나 RAG_EMBEDDING_BASE_URL 로 덮어쓸 수 있습니다.
# 형식: http://<호스트>:<포트> (슬래시는 http:// 뒤 두 개만 — http///// 처럼 쓰면 안 됩니다.)
rag:
  embedding:
    base-url: http://101.79.17.44:8001
    path: ${RAG_EMBEDDING_PATH:/api/v1/embed}
    connect-timeout-seconds: ${RAG_EMBEDDING_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${RAG_EMBEDDING_READ_TIMEOUT_SECONDS:120}
    api-key: ${RAG_EMBEDDING_API_KEY:}
    dimension: ${RAG_EMBEDDING_DIMENSION:768}

# todo: 추후에 fastapi endpoint 만들어지면 등록하기
ai:
  fastapi:
    url: ${FASTAPI_CHAT_URL:http://localhost:8000/chat}

popply:
  base-url: https://api.popply.co.kr
  store-path: /api/store/
  origin: https://www.popply.co.kr
  referer: https://www.popply.co.kr/
  timeout-seconds: 10

ncp:
  client-id: ${NCP_CLIENT_ID:}
  client-secret: ${NCP_CLIENT_SECRET:}

jwt:
  access-token-secret: ${JWT_ACCESS_TOKEN_SECRET:team3-local-access-token-secret-must-be-at-least-32-bytes}
  refresh-token-secret: ${JWT_REFRESH_TOKEN_SECRET:team3-local-refresh-token-secret-must-be-at-least-32-bytes}
  access-token-validity-in-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS:3600}
  refresh-token-validity-in-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS:1209600}

