    base-url: http://127.0.0.1:1
    dimension: 768

jwt:
  access-token-secret: "0123456789012345678901234567890123456789012345678901234567890123"
  refresh-token-secret: "0123456789012345678901234567890123456789012345678901234567890124"
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 7200

oauth:
  naver:
    client-id: test-naver-client-id
    client-secret: test-naver-secret
    redirect-uri: http://localhost/oauth/naver/callback

ai:
